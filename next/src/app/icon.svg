<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Train body -->
  <rect x="12" y="20" width="40" height="24" rx="4" fill="#4A90D9"/>
  <!-- Cabin roof -->
  <rect x="32" y="12" width="18" height="12" rx="3" fill="#3B78C2"/>
  <!-- Smokestack -->
  <rect x="16" y="10" width="8" height="12" rx="2" fill="#2C2C2E"/>
  <rect x="14" y="6" width="12" height="6" rx="3" fill="#3A3A3C"/>
  <!-- Smoke puffs -->
  <circle cx="20" cy="4" r="3" fill="#D1D1D6" opacity="0.7"/>
  <circle cx="15" cy="2" r="2" fill="#D1D1D6" opacity="0.5"/>
  <!-- Front window -->
  <rect x="34" y="15" width="14" height="8" rx="2" fill="#B8E2FF"/>
  <!-- Side windows -->
  <rect x="15" y="24" width="8" height="8" rx="2" fill="#B8E2FF"/>
  <rect x="26" y="24" width="8" height="8" rx="2" fill="#B8E2FF"/>
  <!-- Face - happy smile -->
  <circle cx="19" cy="27" r="1.5" fill="#1D1D1F"/>
  <circle cx="30" cy="27" r="1.5" fill="#1D1D1F"/>
  <path d="M22 31 Q24.5 34 27 31" stroke="#1D1D1F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="20" cy="46" r="6" fill="#2C2C2E"/>
  <circle cx="20" cy="46" r="3" fill="#6B7280"/>
  <circle cx="42" cy="46" r="6" fill="#2C2C2E"/>
  <circle cx="42" cy="46" r="3" fill="#6B7280"/>
  <!-- Cow catcher / front -->
  <rect x="8" y="40" width="4" height="6" rx="1" fill="#E5A100"/>
  <!-- Rail -->
  <rect x="4" y="52" width="56" height="3" rx="1.5" fill="#8E8E93"/>
</svg>
