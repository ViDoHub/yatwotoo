x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  worker:
    build: .
    entrypoint: []
    command: [".venv/bin/python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongo:27017
    volumes:
      - ./backups:/app/backups
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

volumes:
  mongo_data:
