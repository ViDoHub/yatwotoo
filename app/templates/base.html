<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
    <title>{% block title %}YaTwoToo{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    {% block head %}{% endblock %}
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ed;
            --apple-text: #1d1d1f;
            --apple-secondary: #86868b;
            --apple-tertiary: #d2d2d7;
            --apple-radius: 16px;
            --apple-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: var(--apple-bg) !important;
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
        }
        .nav-link {
            font-size: 0.8125rem;
            font-weight: 450;
            color: var(--apple-secondary);
            text-decoration: none;
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            transition: all 0.15s ease;
        }
        .nav-link:hover { color: var(--apple-text); background: rgba(0,0,0,0.04); }
        .nav-link.active { color: var(--apple-blue); background: rgba(0,113,227,0.06); }
    </style>
</head>
<body class="min-h-screen">
    <nav style="background: rgba(255,255,255,0.72); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.04);"
         class="sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
            <a href="/" class="text-base font-semibold flex items-center gap-2" style="color: var(--apple-text); text-decoration: none; letter-spacing: -0.01em;">
                <img src="/static/img/logo.svg" alt="YaTwoToo" style="height: 28px; width: auto;">
                YaTwoToo
            </a>
            <div class="flex items-center gap-1">
                <a href="/" class="nav-link">Home</a>
                <a href="/listings" class="nav-link">Listings</a>
                <a href="/settings" class="nav-link">Settings</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-6" style="color: var(--apple-secondary); font-size: 0.75rem;">
        YaTwoToo
    </footer>
    <script>
    // Highlight active nav link based on current path
    (function() {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === '/' && path === '/') link.classList.add('active');
            else if (href !== '/' && path.startsWith(href)) link.classList.add('active');
        });
    })();
    </script>
</body>
</html>
